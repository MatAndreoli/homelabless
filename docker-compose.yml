services:
  caddy:
    # Internal: listens on :80 (public, http) and :443 (public, https).
    # Proxies <service>.home -> service:<port> via the homelab network.
    image: caddy:2.11
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - homelab
    extra_hosts:
      # Lets Caddy reach services running on the WSL host (Odysseus).
      # Replace 172.27.95.84 with your WSL eth0 IP if it changes
      # (run `hostname -I` in WSL to check). Same IP must also be set
      # in Windows %SystemRoot%\System32\drivers\etc\hosts.
      - "host.docker.internal:host-gateway"
      - "host.docker.internal:172.27.95.84"

  homarr:
    # Internal port: 7575 (proxied by Caddy as dash.home)
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    environment:
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}
      - ALLOWED_ORIGINS=https://dash.home
    volumes:
      - ./homarr-data:/app/data
    networks:
      - homelab

  stirling-pdf:
    # Internal port: 8080 (proxied by Caddy as pdf.home)
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    volumes:
      - ./stirling-data:/configs
    networks:
      - homelab

  uptime-kuma:
    # Internal port: 3001 (proxied by Caddy as status.home)
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ./uptime-kuma-data:/app/data
      # Mount the mkcert root CA so Node's TLS validator trusts our
      # local HTTPS certs. NODE_EXTRA_CA_CERTS points Node to it.
      - ./certs/rootCA.pem:/usr/local/share/ca-certificates/mkcert-rootCA.crt:ro
    environment:
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/mkcert-rootCA.crt
    networks:
      - homelab

volumes:
  caddy_data:
  caddy_config:

networks:
  homelab:
    driver: bridge
