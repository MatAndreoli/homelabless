# x-logging: shared log rotation config. Caps each container's log at 10MB
# across 3 files (30MB max per container). Prevents /var/lib/docker from
# filling up over time. Apply with `logging: *default-logging` per service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    # Internal: listens on :80 (public, http) and :443 (public, https).
    # Proxies <service>.homelab.less -> service:<port> via the homelab network.
    image: caddy:2.11
    container_name: caddy
    logging: *default-logging
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/caddy/entrypoint.sh"]
    command: []
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/entrypoint.sh:/etc/caddy/entrypoint.sh:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # WSL host IP — interpolated by caddy/entrypoint.sh into the
      # Caddyfile's {{WSL_HOST_IP}} placeholders.
      - WSL_HOST_IP=${WSL_HOST_IP}
    networks:
      - homelab
    extra_hosts:
      # Lets Caddy reach services running on the WSL host (Odysseus).
      # Same value as WSL_HOST_IP in .env; same must be set in Windows
      # %SystemRoot%\System32\drivers\etc\hosts.
      - "host.docker.internal:host-gateway"
      - "host.docker.internal:${WSL_HOST_IP}"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:2019/config/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  stirling-pdf:
    # Internal port: 8080 (proxied by Caddy as pdf.homelab.less)
    image: stirlingtools/stirling-pdf:2.13.1
    container_name: stirling-pdf
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - ./stirling-data:/configs
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "-o",
          "/dev/null",
          "http://localhost:8080/actuator/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - homelab

  uptime-kuma:
    # Internal port: 3001 (proxied by Caddy as status.homelab.less)
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - ./uptime-kuma-data:/app/data
      # Mount the mkcert root CA so Node's TLS validator trusts our
      # local HTTPS certs. NODE_EXTRA_CA_CERTS points Node to it.
      - ./certs/rootCA.pem:/usr/local/share/ca-certificates/mkcert-rootCA.crt:ro
    environment:
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/mkcert-rootCA.crt
    extra_hosts:
      # Lets Uptime-Kuma probe services running on the WSL host directly
      # (e.g. Odysseus), bypassing Caddy + Authelia.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - homelab

  it-tools:
    # Internal port: 80 (proxied by Caddy as tools.homelab.less)
    # Stateless toolbox for dev. No DB, no login.
    image: corentinth/it-tools:2024.10.22-7ca5933
    container_name: it-tools
    logging: *default-logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - homelab

  portainer:
    # Internal port: 9000 (proxied by Caddy as portainer.homelab.less)
    # Web UI for managing Docker containers, images, volumes, networks.
    # Mounts the Docker socket to control the daemon. Required for the
    # app to function; gives Portainer root-equivalent control.
    image: portainer/portainer-ce:2.39.3-alpine
    container_name: portainer
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9000/api/status",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - homelab

  homepage:
    # Internal port: 3000. NOT published to the host — access is via Caddy
    # at https://dash.homelab.less. Caddy reaches the container by name on the
    # homelab network, so no host port is needed.
    image: gethomepage/homepage:v1.13.2
    container_name: homepage
    logging: *default-logging
    restart: unless-stopped
    environment:
      # Allow Host header validation. Add every hostname that Caddy
      # proxies to Homepage.
      - HOMEPAGE_ALLOWED_HOSTS=dash.homelab.less
      # Mount the mkcert root CA so HTTPS siteMonitor checks work.
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/mkcert-rootCA.crt
      # Map HOMEPAGE_VAR_PORTAINER_KEY from the host's PORTAINER_API_KEY
      # (defined in .env). Homepage interpolates {{HOMEPAGE_VAR_PORTAINER_KEY}}
      # in services.yaml at config-load time.
      - HOMEPAGE_VAR_PORTAINER_KEY=${PORTAINER_API_KEY}
      # Same pattern for the Beszel widget. User/password/systemId all
      # live in .env so services.yaml stays free of credentials.
      - HOMEPAGE_VAR_BESZEL_USER=${BESZEL_USER}
      - HOMEPAGE_VAR_BESZEL_PASSWORD=${BESZEL_PASSWORD}
      - HOMEPAGE_VAR_BESZEL_SYSTEM_ID=${BESZEL_SYSTEM_ID}
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs/rootCA.pem:/usr/local/share/ca-certificates/mkcert-rootCA.crt:ro
      # Mount background images into Homepage's static public dir.
      # Restart required after adding new images (Next.js limitation).
      - ./homepage/images:/app/public/images:ro
    extra_hosts:
      # Map all .homelab.less hostnames to the WSL host IP so the Homepage
      # siteMonitor can reach them via the public mkcert certs.
      - "dash.homelab.less:${WSL_HOST_IP}"
      - "pdf.homelab.less:${WSL_HOST_IP}"
      - "status.homelab.less:${WSL_HOST_IP}"
      - "tools.homelab.less:${WSL_HOST_IP}"
      - "portainer.homelab.less:${WSL_HOST_IP}"
      - "odysseus.homelab.less:${WSL_HOST_IP}"
      # Lets Homepage probe services running on the WSL host directly
      # (e.g. Odysseus), bypassing Caddy + Authelia.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - homelab

  authelia:
    # Internal port: 9091. Proxied by Caddy as login.homelab.less.
    # Single Go binary + SQLite. Gates every *.homelab.less vhost via Caddy
    # forward_auth. Session cookie set on parent domain '.homelab.less' so one
    # login covers all .homelab.less routes.
    image: authelia/authelia:4.39.20
    container_name: authelia
    logging: *default-logging
    restart: unless-stopped
    # Secrets from .env (gitignored) — substituted into configuration.yml
    # via ${VAR} syntax. All three are sensitive; do not commit values.
    environment:
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users.yml:/config/users.yml:ro
      - authelia_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - homelab

  beszel-hub:
    # Internal port: 8090 (proxied by Caddy as beszel.homelab.less).
    # Web UI + WebSocket endpoint for agents. Single Go binary + PocketBase
    # SQLite at /beszel_data. Not published to host — Caddy reaches it by
    # name on the homelab network.
    image: henrygd/beszel:0.18.7
    container_name: beszel-hub
    logging: *default-logging
    restart: unless-stopped
    # Public URL — PocketBase uses it to build correct callback URLs and
    # set cookies for the right domain. Required when reverse-proxied.
    # BESZEL_HUB_USER_EMAIL seeds the initial "temp" superuser with this
    # email; the installer's internal check looks for exactly this value
    # (and would otherwise 403 on PocketBase 0.23+ which defaults to a
    # different temp email). On first run, the installer UI replaces this
    # temp superuser with a real one. Change to anything you like.
    environment:
      - APP_URL=https://beszel.homelab.less
      - BESZEL_HUB_USER_EMAIL=_@b.b
    volumes:
      - ./beszel-hub-data:/beszel_data
      # Shared unix socket volume — the agent listens on this socket, the
      # hub dials it. Avoids exposing the agent's SSH port and lets the
      # hub's per-system "Host" config be a socket path.
      - ./beszel-socket:/beszel_socket
    healthcheck:
      # The hub image is a single Go binary with no shell, wget, or curl.
      # It ships a built-in `beszel health` subcommand for healthchecks.
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - homelab

  beszel-agent:
    # Listens on the shared unix socket; the hub dials it. Monitors the
    # WSL host itself (via /proc + /sys bind mounts) and every docker
    # container (via the docker socket). No TCP port published.
    image: henrygd/beszel-agent:0.18.7
    container_name: beszel-agent
    logging: *default-logging
    restart: unless-stopped
    environment:
      # Resolved via Docker DNS on the homelab network.
      - HUB_URL=http://beszel-hub:8090
      # Public key for the SSH keypair in the hub's data dir
      # (./beszel-hub-data/id_ed25519). See .env.example for how to
      # extract / rotate. Required.
      - KEY=${BESZEL_AGENT_KEY}
      # Registration token from the hub's "Add System" dialog. Required.
      - TOKEN=${BESZEL_AGENT_TOKEN}
      # Listen on the shared socket — the hub dials this path.
      - LISTEN=/beszel_socket/beszel.sock
      # Tell the agent to read host CPU/RAM from /host/proc and host
      # disk/net from /host/sys, where we bind-mount the host's mounts.
      - PROC_PATH=/host/proc
      - SYS_PATH=/host/sys
    volumes:
      # Shared with beszel-hub — agent writes socket, hub reads it.
      - ./beszel-socket:/beszel_socket
      # Per-container stats (same pattern as homepage).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Host CPU/RAM. /proc inside the container would be the container's
      # own /proc, so we bind-mount the host's /proc at /host/proc and
      # point the agent at it via PROC_PATH.
      - /proc:/host/proc:ro
      # Host disk/net stats.
      - /sys:/host/sys:ro
    depends_on:
      beszel-hub:
        condition: service_healthy
    networks:
      - homelab

volumes:
  caddy_data:
  caddy_config:
  portainer_data:
  authelia_data:

networks:
  homelab:
    driver: bridge
