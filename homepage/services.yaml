---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Management:
    - Portainer:
        href: https://portainer.homelab.less
        description: Docker management
        icon: portainer
        siteMonitor: http://portainer:9000
        ping: http://portainer:9000
        widget:
          type: portainer
          url: http://portainer:9000
          # env = Portainer endpoint ID (visible in Portainer UI under
          # Environments, in the URL fragment e.g. #!/endpoints/3 -> 3)
          env: 3
          # Set kubernetes: true if your Portainer endpoint is Kubernetes
          # The key is interpolated from HOMEPAGE_VAR_PORTAINER_KEY env var
          # on the Homepage container (set in docker-compose.yml).
          key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
    - Uptime Kuma:
        href: https://status.homelab.less
        description: Uptime monitor
        icon: uptime-kuma
        siteMonitor: http://uptime-kuma:3001
        ping: http://uptime-kuma:3001
        widget:
          type: uptimekuma
          url: http://uptime-kuma:3001
          slug: homelab
    - Caddy:
        href: https://dash.homelab.less
        description: Reverse proxy
        icon: caddy
        siteMonitor: http://caddy:2019/config/
        ping: http://caddy:2019/config/
        widget:
          type: caddy
          url: http://caddy:2019
    - Beszel:
        href: https://beszel.homelab.less
        description: Resource monitor
        icon: beszel
        siteMonitor: http://beszel-hub:8090
        ping: http://beszel-hub:8090
        widget:
          type: beszel
          url: http://beszel-hub:8090
          # Credentials live in .env (BESZEL_USER / BESZEL_PASSWORD /
          # BESZEL_SYSTEM_ID) and are interpolated by Homepage from the
          # matching HOMEPAGE_VAR_* env vars on the container. See
          # docker-compose.yml -> homepage.environment.
          username: "{{HOMEPAGE_VAR_BESZEL_USER}}"
          password: "{{HOMEPAGE_VAR_BESZEL_PASSWORD}}"
          systemId: "{{HOMEPAGE_VAR_BESZEL_SYSTEM_ID}}"
          version: 2

- Tools:
    - Stirling-PDF:
        href: https://pdf.homelab.less
        description: PDF tools
        icon: mdi-file-pdf-box
        siteMonitor: http://stirling-pdf:8080
        ping: http://stirling-pdf:8080
    - IT-Tools:
        href: https://tools.homelab.less
        description: Dev toolbox
        icon: it-tools
        siteMonitor: http://it-tools:80
        ping: http://it-tools:80
    - Odysseus:
        href: https://odysseus.homelab.less
        description: AI workspace
        icon: odysseus
        siteMonitor: http://host.docker.internal:7000
        ping: http://host.docker.internal:7000
