---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Management:
    - Portainer:
        href: https://portainer.homelab.less
        description: Docker management
        icon: portainer
        siteMonitor: https://portainer.homelab.less
        ping: https://portainer.homelab.less
        widget:
          type: portainer
          url: http://portainer:9000
          # env = Portainer endpoint ID (visible in Portainer UI under
          # Environments, in the URL fragment e.g. #!/endpoints/3 -> 3)
          env: 3
          # Set kubernetes: true if your Portainer endpoint is Kubernetes
          # The key is interpolated from HOMEPAGE_VAR_PORTAINER_KEY env var
          # on the Homepage container (set in docker-compose.yml).
          key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
    - Uptime Kuma:
        href: https://status.homelab.less
        description: Uptime monitor
        icon: uptime-kuma
        siteMonitor: https://status.homelab.less
        ping: https://status.homelab.less
        widget:
          type: uptimekuma
          url: https://status.homelab.less
          slug: homelab
    - Caddy:
        href: https://dash.homelab.less
        description: Reverse proxy
        icon: caddy
        siteMonitor: https://dash.homelab.less
        ping: https://dash.homelab.less
        widget:
          type: caddy
          url: http://caddy:2019

- Tools:
    - Stirling-PDF:
        href: https://pdf.homelab.less
        description: PDF tools
        icon: mdi-file-pdf-box
        siteMonitor: https://pdf.homelab.less
        ping: https://pdf.homelab.less
    - IT-Tools:
        href: https://tools.homelab.less
        description: Dev toolbox
        icon: it-tools
        siteMonitor: https://tools.homelab.less
        ping: https://tools.homelab.less
    - Odysseus:
        href: https://odysseus.homelab.less
        description: AI workspace
        icon: odysseus
        siteMonitor: https://odysseus.homelab.less
        ping: https://odysseus.homelab.less
